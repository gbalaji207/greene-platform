name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test All Modules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build all modules
        run: ./gradlew build -x test

      - name: Run tests - core
        run: ./gradlew :core:test

      - name: Run tests - training
        run: ./gradlew :training:test

      - name: Run tests - farming
        run: ./gradlew :farming:test

      - name: Run tests - journal
        run: ./gradlew :journal:test

      - name: Run tests - content
        run: ./gradlew :content:test

      - name: Run tests - notifications
        run: ./gradlew :notifications:test

      - name: Run tests - support
        run: ./gradlew :support:test

      - name: Run tests - app
        run: ./gradlew :app:test

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/build/reports/tests/'