spring:
  profiles:
    default: dev   # overridden by SPRING_PROFILES_ACTIVE env var in staging/prod

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/greene_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

# ── OTP behaviour ─────────────────────────────────────────────────────────────
otp:
  expiry-minutes: 10              # How long a generated OTP is valid
  resend-wait-minutes: 1          # Minimum gap between resend attempts
  max-resend-attempts: 3          # Max resends per active OTP
  rate-limit-max: 3               # Max new-OTP generations per window
  rate-limit-window-minutes: 10   # Window length for new-OTP rate limit

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt:
  # RSA-2048 PKCS#8 private key (BEGIN PRIVATE KEY header).
  # In production supply via JWT_PRIVATE_KEY env var (literal \n for line breaks).
  private-key: ${JWT_PRIVATE_KEY}
  access-token-expiry-minutes: 60  # access token TTL in minutes
  refresh-token-expiry-days: 30    # refresh token TTL in days

# ── AWS SES ───────────────────────────────────────────────────────────────────
aws:
  ses:
    region: ${AWS_SES_REGION:ap-south-1}
    from-address: ${AWS_SES_FROM_ADDRESS}

# ── Content module ─────────────────────────────────────────────────────────────
content:
  max-article-size-kb: 500           # Maximum HTML article size before upload is rejected

