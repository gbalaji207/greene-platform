spring:

  config:
    # Load .env from the project root as a native Spring property source.
    # [.properties] tells Spring Boot to parse it as key=value format.
    # optional: means startup succeeds even if the file is absent (e.g. in CI).
    import: "optional:file:.env[.properties]"

  servlet:
    multipart:
      max-file-size: 6MB      # slightly above our 5MB limit so the controller handles the rejection
      max-request-size: 6MB

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/greene_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  flyway:
    enabled: true

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: INFO
    com.greene: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    enabled: true
    path: /api-docs

aws:
  ses:
    region: ap-south-1
    from-address: noreply@greene.local

# ── Object Storage (MinIO — local dev) ────────────────────────────────────────
storage:
  endpoint: http://localhost:9000
  bucket: greene-dev
  access-key: greeneminio
  secret-key: greeneminio123
  presigned-url-expiry-minutes: 60
