spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/greene_db
    username: greene_user
    password: greene_pass

  flyway:
    enabled: false   # disable until you have DB running

  autoconfigure:
    exclude:
      - org.springframework.boot

  springdoc:
    swagger-ui:
      enabled: true
      path: /swagger-ui
      try-it-out-enabled: true
      operations-sorter: alpha
      tags-sorter: alpha
    api-docs:
      enabled: true
      path: /api-docs